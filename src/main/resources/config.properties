# Web Automation Configuration
browser=chrome
headless=false
implicitWait=10
explicitWait=30
pageLoadTimeout=30
scriptTimeout=20
window.maximize=true

# Web Application URLs
web.baseURL=https://automationexercise.com

# API Configuration
api.baseURL=https://reqres.in
api.timeout=10000
api.key=
api.auth.token=

# Appium Configuration
#appium.server.url=http://localhost:4723

# Mobile Configuration (Android)
appium.server.url=http://127.0.0.1:4723
mobile.platformName=Android
mobile.automationName=UiAutomator2
mobile.deviceName=emulator-5554
mobile.appPackage=com.android.calculator2
mobile.appActivity=com.android.calculator2.Calculator
mobile.use.mock.driver=true

# Windows Configuration
windows.app=Notepad

# Database Configuration (if needed)
db.host=localhost
db.port=3306
db.username=root
db.password=root
db.name=automation_db

# Reporting Configuration
report.path=test-reports
report.format=html

# Logging Configuration
log.level=INFO
log.path=logs
